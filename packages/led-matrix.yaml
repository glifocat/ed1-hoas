# ==============================================================================
# ED1 LED Matrix Package - 32x8 WS2812B LED matrix (256 LEDs)
# ==============================================================================

light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    chipset: WS2812
    # Hardware-verified 2026-07-07: the matrix is an EXTERNAL accessory that
    # plugs into the D2 header (S=data, +=5V, -=GND) = GPIO25. The old GPIO12
    # (D1) assignment was never hardware-tested; GPIO12 is also a strapping
    # pin (MTDI) - a panel pulling it high at reset selects 1.8V flash and
    # the board never boots.
    pin: GPIO25
    num_leds: 256
    name: "${friendly_name} LED Matrix"
    id: led_matrix_light
    default_transition_length: 0s
    color_correct: [40%, 40%, 40%]

display:
  - platform: addressable_light
    id: led_matrix_display
    addressable_light_id: led_matrix_light
    width: 32
    height: 8
    pixel_mapper: |-
      if (x % 2 == 0) return (x * 8) + y;
      return (x * 8) + (7 - y);
    update_interval: 200ms  # Reduced from 50ms - sufficient for static text
    lambda: |-
      auto v = id(led_matrix_light).current_values;
      auto c = Color(
        v.get_red() * 255.0f,
        v.get_green() * 255.0f,
        v.get_blue() * 255.0f
      );

      it.fill(Color(0, 0, 0));
      if (id(matrix_text_input).state != "") {
        it.print(0, 0, id(pixel_font), c, id(matrix_text_input).state.c_str());
      }

text:
  - platform: template
    name: "${friendly_name} Matrix Text"
    id: matrix_text_input
    optimistic: true
    min_length: 0
    max_length: 20
    mode: text
