# ==============================================================================
# ED1 Scene Deck - Modular ESPHome Configuration
# ==============================================================================
#
# A 6-button Home Assistant action deck ("Stream Deck lite").
# - Each touch button fires an esphome.deck_button event in Home Assistant
# - The display shows a live label per button, editable from the HA device page
# - Actions are configured with real pickers via the companion blueprint:
#   ha/blueprints/ed1_scene_deck.yaml
#
# Setup:
#   1. Copy this file and rename (e.g. ed1-deck-livingroom.yaml)
#   2. Change the substitutions below
#   3. Run: esphome run <your-config>.yaml
#   4. In HA: Settings -> Automations -> Blueprints -> Import Blueprint:
#      https://github.com/glifocat/ed1-hoas/blob/main/ha/blueprints/ed1_scene_deck.yaml
#   5. Create an automation from the blueprint, pick an action per button
#   6. Edit the button labels on the device page in HA
#
# ==============================================================================

substitutions:
  device_name: ed1-deck
  friendly_name: ED1 Scene Deck
  ap_ssid: ED1-Deck-Rescue
  # Credentials injected into packages (remote packages cannot use !secret)
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  fallback_ap_password: !secret fallback_ap_password
  api_encryption_key: !secret api_encryption_key
  ota_password: !secret ota_password

packages:
  colors: !include packages/display-colors.yaml
  layout: !include packages/display-layout.yaml
  core: !include packages/core.yaml
  hardware: !include packages/hardware.yaml
  display: !include packages/display.yaml
  fonts: !include packages/fonts.yaml
  buzzer: !include packages/buzzer.yaml
  buttons: !include packages/buttons.yaml
  sensors: !include packages/sensors.yaml

# Track HA connection
api:
  on_client_connected:
    - lambda: 'id(ha_connected) = true;'
  on_client_disconnected:
    - lambda: 'id(ha_connected) = false;'

# Time sync for the header clock
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Madrid

# Startup animation and globals
esphome:
  on_boot:
    priority: -100
    then:
      - rtttl.play: 'startup:d=16,o=5,b=180:c,e,g,c6'
      - delay: 2s
      - lambda: 'id(boot_complete) = true;'

globals:
  - id: boot_complete
    type: bool
    initial_value: 'false'
  - id: ha_connected
    type: bool
    initial_value: 'false'
  - id: flash_row
    type: int
    initial_value: '-1'
  - id: flash_until
    type: uint32_t
    initial_value: '0'

# Per-button labels, editable from the HA device page (persisted on device)
text:
  - platform: template
    name: "Up Label"
    id: label_up
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text
  - platform: template
    name: "Down Label"
    id: label_down
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text
  - platform: template
    name: "Left Label"
    id: label_left
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text
  - platform: template
    name: "Right Label"
    id: label_right
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text
  - platform: template
    name: "OK Label"
    id: label_ok
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text
  - platform: template
    name: "X Label"
    id: label_x
    optimistic: true
    restore_value: true
    initial_value: "-"
    min_length: 0
    max_length: 18
    mode: text

# Buttons: flash the row and fire the HA event (or error melody offline).
# NOTE: !extend APPENDS to the base on_press (verified on hardware), so the
# beep from packages/buttons.yaml already plays - don't re-add it here.
binary_sensor:
  - id: !extend btn_up
    on_press:
      - lambda: |-
          id(flash_row) = 0;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: up
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

  - id: !extend btn_down
    on_press:
      - lambda: |-
          id(flash_row) = 1;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: down
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

  - id: !extend btn_left
    on_press:
      - lambda: |-
          id(flash_row) = 2;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: left
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

  - id: !extend btn_right
    on_press:
      - lambda: |-
          id(flash_row) = 3;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: right
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

  - id: !extend btn_ok
    on_press:
      - lambda: |-
          id(flash_row) = 4;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: ok
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

  - id: !extend btn_x
    on_press:
      - lambda: |-
          id(flash_row) = 5;
          id(flash_until) = millis() + 1500;
      - if:
          condition:
            api.connected:
          then:
            - homeassistant.event:
                event: esphome.deck_button
                data:
                  button: x
                  device: ${device_name}
          else:
            - rtttl.play: 'err:d=8,o=4,b=120:c,c'

# Deck display: header, 6 label rows, footer
display:
  - id: !extend internal_display
    lambda: |-
      // Colors (from display-colors.yaml)
      auto BG        = Color(${color_bg});
      auto TEXT      = Color(${color_text});
      auto MUTED     = Color(${color_muted});
      auto DIM       = Color(${color_dim});
      auto OK        = Color(${color_ok});
      auto WARN      = Color(${color_warn});
      auto ACCENT    = Color(${color_accent});
      auto HIGHLIGHT = Color(${color_highlight});

      // Layout (from display-layout.yaml)
      const int W = ${display_width};
      const int HEADER_H = ${header_height};
      const int CONTENT_Y = ${content_y};
      const int FOOTER_Y = ${footer_y};
      const int PAD = ${padding};

      it.fill(BG);

      // Boot splash
      if (!id(boot_complete)) {
        it.filled_rectangle(0, 40, W, 30, HIGHLIGHT);
        it.print(W/2, 48, id(large_font), BG, TextAlign::CENTER, "ED1");
        it.print(W/2, 80, id(pixel_font), MUTED, TextAlign::CENTER, "DECK BOOTING");
        return;
      }

      // --- HEADER ---
      it.filled_rectangle(0, 0, W, HEADER_H, HIGHLIGHT);
      bool connected = !id(wifi_ip).state.empty() && id(ha_connected);
      if (connected) {
        it.filled_circle(10, HEADER_H/2, 4, OK);
        it.print(20, 6, id(pixel_font), BG, "DECK");
      } else {
        int sec = (int)id(uptime_sensor).state;
        if (sec % 2 == 0) it.filled_circle(10, HEADER_H/2, 4, WARN);
        else it.circle(10, HEADER_H/2, 4, WARN);
        it.print(20, 6, id(pixel_font), BG, "OFFLINE");
      }
      auto time = id(sntp_time).now();
      if (time.is_valid()) {
        it.strftime(W - PAD, 6, id(pixel_font), BG, TextAlign::TOP_RIGHT, "%H:%M", time);
      }

      // --- BUTTON ROWS ---
      // Expire the press flash
      if (id(flash_row) >= 0 && millis() > id(flash_until)) id(flash_row) = -1;

      const char* symbols[6] = {"^", "v", "<", ">", "OK", "X"};
      std::string labels[6] = {
        id(label_up).state, id(label_down).state, id(label_left).state,
        id(label_right).state, id(label_ok).state, id(label_x).state
      };

      const int ROW_H = 15;  // 6 rows in the 90px content area
      for (int i = 0; i < 6; i++) {
        int y = CONTENT_Y + i * ROW_H;
        bool unset = labels[i].empty() || labels[i] == "-";
        if (i == id(flash_row)) {
          // Inverted flash on press
          it.filled_rectangle(0, y - 1, W, ROW_H, ACCENT);
          it.printf(PAD, y + 2, id(pixel_font), BG, "%s", symbols[i]);
          it.printf(22, y + 2, id(pixel_font), BG, "%s",
                    unset ? "(no action)" : labels[i].c_str());
        } else {
          it.printf(PAD, y + 2, id(pixel_font), unset ? DIM : HIGHLIGHT, "%s", symbols[i]);
          it.printf(22, y + 2, id(message_font), unset ? DIM : TEXT, "%s",
                    unset ? "-" : labels[i].c_str());
        }
      }

      // --- FOOTER ---
      it.horizontal_line(0, FOOTER_Y, W, MUTED);
      it.printf(PAD, ${footer_text_y}, id(pixel_font), MUTED, "%.0f%%", id(light_sensor).state);
      it.print(W - PAD, ${footer_text_y}, id(pixel_font), MUTED, TextAlign::TOP_RIGHT, "SCENE DECK");
